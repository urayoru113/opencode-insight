name: npm-publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - name: Rewrite README image paths
        run: bun scripts/prepublish-readme.mjs ${{ github.event.release.tag_name }}

      - run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      - run: bun publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
